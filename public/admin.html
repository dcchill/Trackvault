<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrackVault Admin</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/track_notext.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="admin-page">
    <header class="topbar">
      <a class="brand" href="/admin" aria-label="TrackVault admin">
        <img class="brand-logo" src="/track_notext.png" alt="">
        <span>
          <strong>TrackVault</strong>
          <small>Admin</small>
        </span>
      </a>
      <nav class="topbar-actions" aria-label="Primary">
        <a class="button secondary" href="/app">Open Player</a>
        <button id="logout-button" class="button secondary" type="button" hidden>Log Out</button>
      </nav>
    </header>

    <main id="auth-view" class="auth-shell" hidden>
      <section class="panel auth-panel" aria-labelledby="auth-title">
        <div class="section-heading">
          <h1 id="auth-title">Admin Login</h1>
        </div>
        <form id="auth-form" class="settings-form">
          <p id="auth-copy" class="muted">Enter the admin password to manage TrackVault.</p>
          <label>
            <span>Password</span>
            <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
          </label>
          <label id="confirm-password-row" hidden>
            <span>Confirm password</span>
            <input id="admin-password-confirm" name="confirmPassword" type="password" autocomplete="new-password">
          </label>
          <button id="auth-submit" class="button accent" type="submit">Log In</button>
        </form>
        <div id="auth-message" class="message" role="status" aria-live="polite"></div>
      </section>
    </main>

    <main id="admin-view" class="admin-grid" hidden>
      <section class="panel settings-panel" aria-labelledby="settings-title">
        <div class="section-heading">
          <h1 id="settings-title">Server</h1>
          <span id="scan-status" class="status-pill">Idle</span>
        </div>

        <form id="settings-form" class="settings-form">
          <label>
            <span>Server name</span>
            <input id="server-name" name="serverName" type="text" autocomplete="off">
          </label>
          <label>
            <span>Music library path</span>
            <input id="library-path" name="libraryPath" type="text" autocomplete="off">
          </label>
          <label class="switch-row">
            <input id="scan-on-start" name="scanOnStart" type="checkbox">
            <span>Scan on start</span>
          </label>
          <div class="form-actions">
            <button class="button" type="submit">Save</button>
            <button id="scan-button" class="button accent" type="button">Scan Library</button>
          </div>
          <div class="form-actions">
            <button id="clear-library-button" class="button danger" type="button">Clear library.json</button>
            <button id="clear-playlists-button" class="button danger" type="button">Clear playlists.json</button>
          </div>
          <div class="form-actions">
            <button id="remove-password-button" class="button danger" type="button">Remove Admin Password</button>
          </div>
          <button id="shutdown-button" class="button danger" type="button">Shut Down TrackVault</button>
        </form>

        <div id="admin-message" class="message" role="status" aria-live="polite"></div>
      </section>

      <section class="admin-workspace">
        <div class="metric-grid" aria-label="Library summary">
          <article class="metric-card">
            <span>Tracks</span>
            <strong id="metric-tracks">0</strong>
          </article>
          <article class="metric-card">
            <span>Albums</span>
            <strong id="metric-albums">0</strong>
          </article>
          <article class="metric-card">
            <span>Artists</span>
            <strong id="metric-artists">0</strong>
          </article>
          <article class="metric-card">
            <span>Storage</span>
            <strong id="metric-storage">0 B</strong>
          </article>
        </div>

        <section class="panel" aria-labelledby="library-title">
          <div class="section-heading">
            <h2 id="library-title">Library</h2>
            <span id="last-scan" class="muted">Never scanned</span>
          </div>
          <div id="album-preview" class="album-strip"></div>
        </section>

        <section class="panel" aria-labelledby="tracks-title">
          <div class="section-heading">
            <h2 id="tracks-title">Tracks</h2>
            <span id="library-root" class="muted path-text"></span>
          </div>
          <div id="track-preview" class="admin-track-list"></div>
        </section>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
