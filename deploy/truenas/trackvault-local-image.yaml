services:
  trackvault:
    image: trackvault:latest
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      PORT: "8096"
      TRACKVAULT_DATA: /data
      TRACKVAULT_LIBRARY: /music
    volumes:
      - /mnt/POOL/apps/trackvault/data:/data
      - /mnt/POOL/media/music:/music:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8096/api/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
