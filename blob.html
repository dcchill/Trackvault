<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrackVault Blob</title>
    <style>
      :root {
        color: #f7f2ec;
        background: #000000;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(255, 136, 72, 0.22), transparent 34vw),
          #000000;
      }

      main {
        display: grid;
        width: min(92vw, 880px);
        gap: 18px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand img {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        object-fit: cover;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 3vw, 2.2rem);
      }

      input {
        max-width: 320px;
        color: #f7f2ec;
      }

      .stage {
        display: grid;
        aspect-ratio: 1;
        min-height: 320px;
        overflow: hidden;
        border: 1px solid rgba(255, 136, 72, 0.26);
        border-radius: 8px;
        background: #050505;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      audio {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="brand">
          <img src="Track_notext.png" alt="">
          <h1>TrackVault Blob</h1>
        </div>
        <input id="file-input" type="file" accept="audio/*">
      </header>

      <div class="stage">
        <canvas id="blob-canvas" width="900" height="900" aria-hidden="true"></canvas>
      </div>

      <audio id="audio" controls></audio>
    </main>

    <script>
      const canvas = document.querySelector("#blob-canvas");
      const context = canvas.getContext("2d");
      const audio = document.querySelector("#audio");
      const input = document.querySelector("#file-input");
      const blob = {
        audioContext: null,
        analyser: null,
        source: null,
        data: null,
        energy: 0,
        bass: 0,
        mid: 0,
        startedAt: performance.now()
      };

      input.addEventListener("change", () => {
        const file = input.files && input.files[0];
        if (!file) return;
        audio.src = URL.createObjectURL(file);
        ensureAudioGraph();
        audio.play().catch(() => {});
      });

      audio.addEventListener("play", ensureAudioGraph);
      requestAnimationFrame(draw);

      function ensureAudioGraph() {
        if (blob.source) {
          if (blob.audioContext.state === "suspended") {
            blob.audioContext.resume().catch(() => {});
          }
          return;
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        blob.audioContext = new AudioContext();
        blob.analyser = blob.audioContext.createAnalyser();
        blob.analyser.fftSize = 128;
        blob.analyser.smoothingTimeConstant = 0.86;
        blob.data = new Uint8Array(blob.analyser.frequencyBinCount);
        blob.source = blob.audioContext.createMediaElementSource(audio);
        blob.source.connect(blob.analyser);
        blob.analyser.connect(blob.audioContext.destination);
        blob.audioContext.resume().catch(() => {});
      }

      function draw() {
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.round(rect.width * ratio));
        const height = Math.max(1, Math.round(rect.height * ratio));
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }

        const time = (performance.now() - blob.startedAt) / 1000;
        if (blob.analyser && blob.data) {
          blob.analyser.getByteFrequencyData(blob.data);
          blob.bass = smooth(blob.bass, average(blob.data, 0, 7) / 255, 0.12);
          blob.mid = smooth(blob.mid, average(blob.data, 8, 26) / 255, 0.08);
          blob.energy = smooth(blob.energy, average(blob.data, 0, blob.data.length) / 255, 0.1);
        } else {
          blob.bass = smooth(blob.bass, 0.1 + Math.sin(time * 0.7) * 0.04, 0.03);
          blob.mid = smooth(blob.mid, 0.08 + Math.cos(time * 0.5) * 0.03, 0.03);
          blob.energy = smooth(blob.energy, 0.08, 0.04);
        }

        context.clearRect(0, 0, width, height);
        context.save();
        context.scale(ratio, ratio);
        context.translate(rect.width / 2, rect.height / 2);

        const radius = Math.min(rect.width, rect.height) * (0.28 + blob.energy * 0.08);
        const rings = 18;
        const points = 180;

        for (let ring = 0; ring < rings; ring += 1) {
          const ringScale = 1 - ring * 0.038;
          context.beginPath();
          for (let point = 0; point <= points; point += 1) {
            const angle = (point / points) * Math.PI * 2;
            const slow = time * (0.38 + ring * 0.012);
            const wobble =
              Math.sin(angle * 3 + slow) * (0.14 + blob.bass * 0.2) +
              Math.cos(angle * 5 - slow * 0.8) * (0.09 + blob.mid * 0.14) +
              Math.sin(angle * 2 + slow * 1.7) * 0.06;
            const currentRadius = radius * ringScale * (1 + wobble);
            const x = Math.cos(angle) * currentRadius * (1.08 + blob.mid * 0.1);
            const y = Math.sin(angle) * currentRadius * (0.9 + blob.bass * 0.16);
            if (point === 0) {
              context.moveTo(x, y);
            } else {
              context.lineTo(x, y);
            }
          }
          context.closePath();
          context.strokeStyle = ring === 0 ? "#ff8848" : `rgba(255, 136, 72, ${0.72 - ring * 0.026})`;
          context.lineWidth = Math.max(1, 3 - ring * 0.07);
          context.stroke();
        }

        context.restore();
        requestAnimationFrame(draw);
      }

      function average(values, start, end) {
        let total = 0;
        const stop = Math.min(values.length, end);
        for (let index = start; index < stop; index += 1) {
          total += values[index];
        }
        return total / Math.max(1, stop - start);
      }

      function smooth(current, next, amount) {
        return current + (next - current) * amount;
      }
    </script>
  </body>
</html>
